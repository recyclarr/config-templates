################################################################################

sonarr:
  sonarr-german-uhd-bluray-web-alternative:
    base_url: Put your Sonarr URL here
    api_key: Put your API key here

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 7324309a7d1e10dc0dc2cea6c70ed852  # [German] UHD Bluray + WEB (Alternative)
        reset_unmatched_scores:
          enabled: true

