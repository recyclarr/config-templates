      ## choose specific CFs within a group.
      ##
      ## To uncomment, remove `# ` (hash + space) so that indentation stays aligned.
      ## Most editors do this automatically with toggle-comment (Ctrl+/).
      ##
      ## https://recyclarr.dev/guide/cf-groups/
